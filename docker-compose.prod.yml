# Production stack for vps-eu — deployed to /opt/marketplace on the server.
#
# Layout:
#   caddy   :80, :443  → public reverse proxy + automatic Let's Encrypt TLS
#   web     :3200     → Next.js App Router (internal only)
#   api     :3100     → Fastify API           (internal only)
#   postgres :5432    → pgvector/pgvector:pg17 (internal only, host bind-mount)
#
# Secrets come from the server-side .env (mode 600, owned by root). Never
# committed. See deploy/.env.example for the canonical shape.
#
# First deploy:
#   rsync the repo to /opt/marketplace, fill /opt/marketplace/.env,
#   then: docker compose -f docker-compose.prod.yml up -d --build
#
# Subsequent code deploys:
#   rsync repo, then: docker compose -f docker-compose.prod.yml up -d --build

services:
  caddy:
    image: caddy:2-alpine
    container_name: marketplace-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        # Baked into the Next.js bundle at build time. Must be the canonical
        # public origin — drives metadataBase, canonical URLs, OG tags,
        # robots.txt host field, and sitemap.xml entries.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://teno-store.com}
        # Google OAuth client ID for the in-browser sign-in widget. Shipped to
        # the browser by design (it's the public half of an OAuth client).
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    image: marketplace-web:local
    container_name: marketplace-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3200"
      # Public site URL — used by metadata/canonical/sitemap. MUST be the
      # exact origin Caddy serves, otherwise canonical URLs and OG tags will
      # point to the wrong place and search engines will drop rankings.
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://teno-store.com}
      # Web talks to the API over the docker network, not via Caddy.
      NEXT_PUBLIC_API_BASE_URL: http://api:3100
      MARKETPLACE_API_URL: http://api:3100
    expose:
      - "3200"
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot migration runner. Runs `node packages/db/dist/migrate.js` against
  # the live database and exits. The `api` service waits for this to complete
  # successfully before starting (depends_on.condition: service_completed_successfully).
  # Why: on 2026-05-12 the api image shipped migration 0012 but `docker compose
  # up -d api` doesn't apply migrations — the new code ran against the old
  # schema, every scraper insert silently rolled back on a NOT NULL violation,
  # and the catalog froze for ~30 hours. This sidecar guarantees that any
  # future migration shipped inside the api image is applied before the api
  # starts serving traffic. Re-running this service on a no-op deploy is
  # cheap (drizzle's migrations table makes it idempotent).
  api-migrate:
    image: marketplace-api:local
    container_name: marketplace-api-migrate
    working_dir: /app/packages/db
    command: ["node", "dist/migrate.js"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://marketplace:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/marketplace
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: marketplace-api:local
    container_name: marketplace-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3100"
      ISSUER_KEYS_PATH: /app/minimal-issuer/keys/issuer.json
      DATABASE_URL: postgres://marketplace:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/marketplace
      REDIS_URL: redis://redis:6379
      # Multi-core scaling. `auto` uses available cores capped at 4 (leaves
      # headroom on the 6-core box for postgres / web / scraper). Set to 1
      # to disable clustering and revert to single-process mode.
      API_WORKERS: ${API_WORKERS:-auto}
    volumes:
      - ./minimal-issuer:/app/minimal-issuer:ro
    expose:
      - "3100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/livez').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    # Snapshot storage (spec §8.4) and future session/queue/rate-limit needs.
    # Snapshot data is non-essential — losing it just expires share-links early.
    image: redis:7.4-alpine
    container_name: marketplace-redis
    restart: unless-stopped
    # maxmemory 2gb / allkeys-lru (changed 2026-05-12):
    #   Snapshots are ~26 KB each (full search-result blobs) and accumulate at
    #   the rate scraper-driven catalog.search fires. Live measurement
    #   2026-05-12: 56,236 snap:* keys totalling 1.49 GB at the 2 GB ceiling
    #   despite all having a valid 24h TTL — volatile-lru wasn't keeping up
    #   with the write rate vs the 24h decay window, redis hit maxmemory,
    #   ioredis exhausted retries, and the container OOM-cycled 32 times.
    #   Switching to allkeys-lru lets redis evict ANY key (including non-TTL
    #   ones) under memory pressure — at our current keyspace (effectively
    #   100% snapshots, one pcache:* key) the original "protect durable
    #   session keys" rationale doesn't apply, and any future session
    #   workload will keep its hot keys in cache via LRU recency anyway.
    #   See deploy/CHANGELOG.md 2026-05-12 + reports/anomalies.txt [56] for
    #   the incident.
    command: ["redis-server", "--save", "300", "10", "--appendonly", "no", "--maxmemory", "2gb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - /var/lib/marketplace/redis:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: marketplace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: marketplace
    # Host bind-mount keeps data visible to backup scripts running on the host.
    volumes:
      - /var/lib/marketplace/postgres:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
