# Local dev / single-host deploy for the Marketplace API.
#
# Usage:
#   1) Copy .env.example to .env and fill in GOOGLE_CLIENT_ID.
#   2) docker compose up --build
#
# .env is read by docker compose (env_file) and re-read inside the container by
# `dotenv` at process start. It is NEVER baked into the image (see .dockerignore).

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: marketplace-api:local
    container_name: marketplace-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override host vars so the container listens on all interfaces and
      # uses the issuer keys mounted at /app/minimal-issuer/.
      HOST: 0.0.0.0
      ISSUER_KEYS_PATH: /app/minimal-issuer/keys/issuer.json
      DATABASE_URL: postgres://marketplace:marketplace@postgres:5432/marketplace
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT:-3100}:3100"
    volumes:
      # Issuer keys live outside the image for safety + rotation. Read-only.
      - ./minimal-issuer:/app/minimal-issuer:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/livez').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    # pgvector image bundles the `vector` extension required by 0000_init_extensions.sql.
    # pg_trgm, btree_gin, unaccent, pgcrypto ship with stock Postgres.
    image: pgvector/pgvector:pg17
    container_name: marketplace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    # Used for snapshot storage (spec §8.4) and future session/queue/rate-limit needs.
    # Persistence is on but data is non-essential — losing a snapshot just means an
    # agent's share-link 410s, which is the same as it expiring naturally.
    image: redis:7.4-alpine
    container_name: marketplace-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
  redisdata:
